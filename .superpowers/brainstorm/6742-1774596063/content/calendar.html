<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EWHA Kumdo — 캘린더 페이지</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: #FFFDF1;
    color: #111;
  }
  :root {
    --green: #00462A;
    --green-light: #005535;
    --pear: #FFFDF1;
    --grey: #B9B9B9;
    --grey-mid: #e0e0e0;
  }

  /* 헤더 */
  .header {
    background: var(--green);
    height: 52px;
    display: flex; align-items: center;
    padding: 0 16px; gap: 12px;
  }
  .header .hamburger { color: white; font-size: 18px; }
  .header .logo { color: white; font-weight: 800; font-size: 17px; }
  .header .logo span { color: #a8e6c8; }
  .header .search {
    flex: 1; max-width: 400px; margin: 0 auto;
    background: rgba(255,255,255,0.15);
    border-radius: 14px; padding: 5px 14px;
    font-size: 12px; color: rgba(255,255,255,0.6);
    font-family: 'Pretendard', sans-serif;
  }

  /* 레이아웃 */
  .layout { display: flex; min-height: calc(100vh - 52px); }

  /* 사이드바 */
  .sidebar {
    width: 200px; flex-shrink: 0;
    background: var(--pear);
    border-right: 1px solid var(--grey-mid);
    padding: 12px 0;
  }
  .sidebar-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; cursor: pointer;
    border-radius: 8px; margin: 1px 6px;
    font-size: 13px; font-weight: 500;
  }
  .sidebar-item:hover { background: rgba(0,70,42,0.08); }
  .sidebar-item.active { background: rgba(0,70,42,0.12); color: var(--green); font-weight: 700; }
  .sidebar-item .icon { font-size: 18px; }

  /* 메인 */
  .main { flex: 1; padding: 24px 28px; }

  /* 캘린더 헤더 */
  .cal-nav {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 20px;
  }
  .cal-nav h2 { font-size: 20px; font-weight: 800; color: var(--green); }
  .cal-nav button {
    background: none; border: 1.5px solid var(--grey-mid);
    width: 32px; height: 32px; border-radius: 50%;
    cursor: pointer; font-size: 14px; color: #444;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.15s;
  }
  .cal-nav button:hover { border-color: var(--green); color: var(--green); }

  /* 요일 헤더 */
  .cal-grid {
    width: 100%;
    border-collapse: collapse;
  }
  .cal-grid th {
    font-size: 12px; font-weight: 700;
    color: var(--grey);
    text-align: center;
    padding: 6px 0 10px;
    border-bottom: 1px solid var(--grey-mid);
  }
  .cal-grid th:first-child { color: #e05555; }
  .cal-grid th:last-child  { color: #4a90d9; }

  /* 날짜 셀 */
  .cal-grid td {
    vertical-align: top;
    padding: 6px 4px;
    border-bottom: 1px solid #f0f0f0;
    min-width: 80px;
    height: 88px;
  }
  .day-num {
    font-size: 13px; font-weight: 600;
    color: #333;
    margin-bottom: 4px;
    line-height: 1;
  }
  td:first-child .day-num { color: #e05555; }
  td:last-child  .day-num { color: #4a90d9; }
  .day-num.today {
    display: inline-flex; align-items: center; justify-content: center;
    width: 24px; height: 24px;
    background: var(--green); color: white;
    border-radius: 50%; font-size: 12px;
  }
  .day-num.other-month { color: var(--grey); }

  /* 앵글 배지 */
  .angle-badges { display: flex; flex-direction: column; gap: 3px; }
  .badge {
    display: inline-block;
    font-size: 10px; font-weight: 700;
    padding: 2px 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
    font-family: 'Pretendard', sans-serif;
    border: none;
    text-align: left;
  }
  .badge:hover { opacity: 0.8; transform: translateX(1px); }
  .badge.front {
    background: var(--green); color: white;
  }
  .badge.back {
    background: #374151; color: white;
  }
  .badge.other {
    background: var(--grey); color: white;
  }

  /* 범례 */
  .legend {
    display: flex; gap: 14px; margin-bottom: 16px;
    align-items: center;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #555; }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 3px;
  }
  .legend-dot.front { background: var(--green); }
  .legend-dot.back  { background: #374151; }
  .legend-dot.other { background: var(--grey); }
</style>
</head>
<body>

<div class="header">
  <span class="hamburger">☰</span>
  <span class="logo">EWHA <span>Kumdo</span></span>
  <div class="search">🔍 날짜, 이름, 태그로 검색...</div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-item"><span class="icon">🏠</span> 홈</div>
    <div class="sidebar-item active"><span class="icon">📅</span> 캘린더 보기</div>
    <div class="sidebar-item"><span class="icon">🎯</span> 주제별 보기</div>
    <div class="sidebar-item"><span class="icon">👤</span> 참가자별 보기</div>
  </div>

  <div class="main">

    <!-- 월 네비 -->
    <div class="cal-nav">
      <button>‹</button>
      <h2>2025년 3월</h2>
      <button>›</button>
    </div>

    <!-- 범례 -->
    <div class="legend">
      <div class="legend-item"><div class="legend-dot front"></div> 전면</div>
      <div class="legend-item"><div class="legend-dot back"></div> 후면</div>
      <div class="legend-item"><div class="legend-dot other"></div> 기타</div>
    </div>

    <!-- 달력 -->
    <table class="cal-grid">
      <thead>
        <tr>
          <th>일</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th>토</th>
        </tr>
      </thead>
      <tbody>
        <!-- 1행 -->
        <tr>
          <td><div class="day-num other-month">23</div></td>
          <td><div class="day-num other-month">24</div></td>
          <td><div class="day-num other-month">25</div></td>
          <td><div class="day-num other-month">26</div></td>
          <td><div class="day-num other-month">27</div></td>
          <td><div class="day-num other-month">28</div></td>
          <td>
            <div class="day-num">1</div>
            <div class="angle-badges">
              <span class="badge front">전면</span>
              <span class="badge back">후면</span>
            </div>
          </td>
        </tr>
        <!-- 2행 -->
        <tr>
          <td><div class="day-num">2</div></td>
          <td><div class="day-num">3</div></td>
          <td>
            <div class="day-num">4</div>
            <div class="angle-badges">
              <span class="badge front">전면</span>
            </div>
          </td>
          <td><div class="day-num">5</div></td>
          <td>
            <div class="day-num">6</div>
            <div class="angle-badges">
              <span class="badge front">전면</span>
              <span class="badge back">후면</span>
            </div>
          </td>
          <td><div class="day-num">7</div></td>
          <td><div class="day-num">8</div></td>
        </tr>
        <!-- 3행 -->
        <tr>
          <td><div class="day-num">9</div></td>
          <td>
            <div class="day-num">10</div>
            <div class="angle-badges">
              <span class="badge front">전면</span>
              <span class="badge back">후면</span>
            </div>
          </td>
          <td><div class="day-num">11</div></td>
          <td><div class="day-num">12</div></td>
          <td>
            <div class="day-num">13</div>
            <div class="angle-badges">
              <span class="badge back">후면</span>
            </div>
          </td>
          <td><div class="day-num">14</div></td>
          <td>
            <div class="day-num">15</div>
            <div class="angle-badges">
              <span class="badge front">전면</span>
              <span class="badge back">후면</span>
            </div>
          </td>
        </tr>
        <!-- 4행 -->
        <tr>
          <td><div class="day-num">16</div></td>
          <td><div class="day-num">17</div></td>
          <td>
            <div class="day-num">18</div>
            <div class="angle-badges">
              <span class="badge front">전면</span>
              <span class="badge other">기타</span>
            </div>
          </td>
          <td><div class="day-num">19</div></td>
          <td>
            <div class="day-num today">20</div>
            <div class="angle-badges">
              <span class="badge front">전면</span>
              <span class="badge back">후면</span>
            </div>
          </td>
          <td><div class="day-num">21</div></td>
          <td><div class="day-num">22</div></td>
        </tr>
        <!-- 5행 -->
        <tr>
          <td>
            <div class="day-num">23</div>
            <div class="angle-badges">
              <span class="badge back">후면</span>
            </div>
          </td>
          <td><div class="day-num">24</div></td>
          <td><div class="day-num">25</div></td>
          <td>
            <div class="day-num">26</div>
            <div class="angle-badges">
              <span class="badge front">전면</span>
              <span class="badge back">후면</span>
            </div>
          </td>
          <td><div class="day-num">27</div></td>
          <td><div class="day-num">28</div></td>
          <td><div class="day-num">29</div></td>
        </tr>
        <!-- 6행 -->
        <tr>
          <td>
            <div class="day-num">30</div>
            <div class="angle-badges">
              <span class="badge front">전면</span>
            </div>
          </td>
          <td><div class="day-num">31</div></td>
          <td><div class="day-num other-month">1</div></td>
          <td><div class="day-num other-month">2</div></td>
          <td><div class="day-num other-month">3</div></td>
          <td><div class="day-num other-month">4</div></td>
          <td><div class="day-num other-month">5</div></td>
        </tr>
      </tbody>
    </table>

  </div>
</div>

</body>
</html>
